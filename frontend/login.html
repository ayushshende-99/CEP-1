<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MedAdvisor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo-area">
        <span class="logo">🏥</span>
        <h2>Welcome Back</h2>
        <p>Login to access your health dashboard</p>
      </div>
      <div id="loginError" class="alert alert-error hidden"></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" id="loginBtn">Login</button>
      </form>
      <div class="auth-divider">— or —</div>
      <p class="auth-link">Don't have an account? <a href="register.html">Create Account</a></p>
      <p class="auth-link" style="margin-top:8px"><a href="index.html">← Back to Home</a></p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
