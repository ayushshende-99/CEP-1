<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - MedAdvisor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo-area">
        <span class="logo">🏥</span>
        <h2>Create Account</h2>
        <p>Join MedAdvisor for personalized health guidance</p>
      </div>
      <div id="registerError" class="alert alert-error hidden"></div>
      <div id="registerSuccess" class="alert alert-success hidden"></div>
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" id="registerBtn">Create Account</button>
      </form>
      <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
      <p class="auth-link" style="margin-top:8px"><a href="index.html">← Back to Home</a></p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
