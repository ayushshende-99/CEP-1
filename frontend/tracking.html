<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order - MedAdvisor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar"><div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><span class="logo">🏥</span><h1>MedAdvisor</h1></a>
    <div class="navbar-links" id="navLinks">
      <a href="index.html">Home</a><a href="shop.html">Medicine Shop</a><a href="tracking.html" class="active">Track Order</a>
      <div id="navAuth"><a href="login.html" class="btn btn-outline btn-sm">Login</a></div>
      <div id="navUser" class="nav-user hidden">
        <a href="dashboard.html">Dashboard</a>
        <a href="#" onclick="logout()" style="color:var(--danger)">Logout</a>
      </div>
    </div>
  </div></nav>

  <div class="container" style="padding-top:60px;padding-bottom:60px;min-height:80vh">
    <div class="tracking-search">
      <h2>📦 Track Your Order</h2>
      <p>Enter your tracking ID to see real-time order status</p>
      <div class="search-form">
        <input type="text" id="trackingInput" placeholder="Enter Tracking ID (e.g., MED240324ABC123)" onkeypress="if(event.key==='Enter')trackOrder()">
        <button class="btn btn-primary" onclick="trackOrder()">Track</button>
      </div>
    </div>

    <div id="trackingResult" class="tracking-result hidden">
      <div class="card mb-3">
        <div class="flex justify-between items-center" style="flex-wrap:wrap;gap:12px">
          <div>
            <h3 style="font-size:1.2rem;font-weight:800">Order #<span id="trackOrderId"></span></h3>
            <p style="color:var(--text-light);font-size:0.85rem">Tracking ID: <strong id="trackTrackingId"></strong></p>
          </div>
          <div style="text-align:right">
            <span class="status-badge" id="trackStatus"></span>
            <p style="font-size:0.8rem;color:var(--text-light);margin-top:4px" id="trackDate"></p>
          </div>
        </div>
        <div class="progress-bar-track mt-2">
          <div class="progress-bar-fill" id="trackProgress" style="width:0%"></div>
        </div>
      </div>

      <div class="card">
        <h3 style="font-weight:700;margin-bottom:20px">Delivery Timeline</h3>
        <div class="timeline" id="timeline"></div>
      </div>

      <div class="card mt-3" id="trackItems">
        <h3 style="font-weight:700;margin-bottom:16px">Order Items</h3>
        <div id="trackItemsList"></div>
      </div>
    </div>

    <div id="trackingError" class="hidden">
      <div class="empty-state"><span class="empty-icon">🔍</span><h3>Order Not Found</h3><p>Please check your tracking ID and try again</p></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/app.js"></script>
  <script src="js/tracking.js"></script>
</body>
</html>
